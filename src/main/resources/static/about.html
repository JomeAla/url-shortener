<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Us &mdash; Shrtly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080c14; --surface: #11151f; --surface-glass: rgba(255,255,255,0.03);
    --border-subtle: rgba(255,255,255,0.06);
    --text-primary: #f1f5f9; --text-secondary: #94a3b8; --text-tertiary: #64748b;
    --accent: #d4a54a; --accent-soft: rgba(212,165,74,0.1);
    --radius-sm: 10px; --radius-md: 16px;
    --font: 'Plus Jakarta Sans', -apple-system, sans-serif;
    --ease-smooth: cubic-bezier(0.22,1,0.36,1);
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text-primary); -webkit-font-smoothing: antialiased; padding: 32px 24px; }
  .container { max-width: 800px; margin: 0 auto; }
  .header { margin-bottom: 40px; }
  .header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.03em; }
  .header h1 em { font-style: normal; color: var(--accent); }
  .header p { font-size: 0.9375rem; color: var(--text-secondary); margin-top: 4px; }
  .header .back { display: inline-flex; align-items: center; gap: 4px; font-size: 0.8125rem; color: var(--text-tertiary); text-decoration: none; margin-bottom: 12px; }
  .header .back:hover { color: var(--accent); }
  .content { font-size: 1rem; line-height: 1.8; color: var(--text-secondary); }
  .content h2 { font-size: 1.25rem; font-weight: 700; margin: 32px 0 12px; color: var(--text-primary); }
  .content h3 { font-size: 1.05rem; font-weight: 600; margin: 24px 0 8px; color: var(--text-primary); }
  .content p { margin-bottom: 16px; }
  .content ul { margin-bottom: 16px; padding-left: 20px; }
  .content li { margin-bottom: 6px; }
  .content a { color: var(--accent); text-decoration: underline; }
  .content blockquote { border-left: 3px solid var(--accent); padding: 12px 16px; margin: 16px 0; background: var(--surface-glass); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; color: var(--text-primary); }
  .loading { text-align: center; padding: 48px; color: var(--text-tertiary); }
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a class="back" href="/">&larr; Back to home</a>
      <h1>About <em>Shrtly</em></h1>
      <p id="subtitle">Learn more about our mission and team.</p>
    </div>
    <div class="content" id="pageContent">
      <div class="loading">Loading...</div>
    </div>
  </div>
  <script>
    fetch('/api/pages/content?page=about')
      .then(r => r.json())
      .then(data => {
        const el = document.getElementById('pageContent');
        if (data.content) {
          el.innerHTML = data.content;
        } else {
          el.innerHTML = '<p>We are building the next-generation URL shortening platform designed for speed, reliability, and simplicity. Our mission is to make link management effortless for everyone from individual creators to large enterprises.</p><p>Shrtly provides powerful tools including detailed analytics, QR code generation, custom domains, API access, and team collaboration features &mdash; all wrapped in a modern, intuitive interface.</p><p>Built with a focus on the African market, we offer multi-currency pricing (NGN, USD, EUR, GBP) and optimized infrastructure for fast redirects across the region.</p>';
        }
      })
      .catch(() => {
        document.getElementById('pageContent').innerHTML = '<p>Failed to load content.</p>';
      });
  </script>
</body>
</html>
