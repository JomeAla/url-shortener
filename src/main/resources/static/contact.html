<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us &mdash; Shrtly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080c14; --surface: #11151f; --surface-glass: rgba(255,255,255,0.03);
    --border-subtle: rgba(255,255,255,0.06);
    --text-primary: #f1f5f9; --text-secondary: #94a3b8; --text-tertiary: #64748b;
    --accent: #d4a54a; --accent-soft: rgba(212,165,74,0.1);
    --green: #22c55e; --green-soft: rgba(34,197,94,0.1);
    --red: #ef4444;
    --radius-sm: 10px; --radius-md: 16px;
    --font: 'Plus Jakarta Sans', -apple-system, sans-serif;
    --shadow-glass: 0 0 0 1px rgba(255,255,255,0.06), 0 8px 32px rgba(0,0,0,0.3);
    --ease-smooth: cubic-bezier(0.22,1,0.36,1);
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text-primary); -webkit-font-smoothing: antialiased; padding: 32px 24px; }
  .container { max-width: 800px; margin: 0 auto; }
  .header { margin-bottom: 40px; }
  .header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.03em; }
  .header h1 em { font-style: normal; color: var(--accent); }
  .header p { font-size: 0.9375rem; color: var(--text-secondary); margin-top: 4px; }
  .header .back { display: inline-flex; align-items: center; gap: 4px; font-size: 0.8125rem; color: var(--text-tertiary); text-decoration: none; margin-bottom: 12px; }
  .header .back:hover { color: var(--accent); }
  .split { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
  .content { font-size: 1rem; line-height: 1.8; color: var(--text-secondary); }
  .content p { margin-bottom: 16px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 0.8125rem; font-weight: 600; margin-bottom: 4px; color: var(--text-secondary); }
  .form-group input, .form-group textarea { width: 100%; padding: 10px 14px; border: 1.5px solid rgba(255,255,255,0.08); border-radius: var(--radius-sm); font: inherit; font-size: 0.875rem; background: var(--bg); outline: none; color: var(--text-primary); transition: border-color 0.2s; }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
  .btn-primary { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, var(--accent), #b8942e); color: #fff; border: none; font: inherit; font-size: 0.8125rem; font-weight: 600; padding: 10px 20px; border-radius: 100px; cursor: pointer; transition: all 0.3s var(--ease-smooth); box-shadow: 0 1px 3px rgba(212,165,74,0.15); }
  .btn-primary:hover { background: linear-gradient(135deg, #b8942e, var(--accent)); box-shadow: 0 4px 16px rgba(212,165,74,0.2); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .notify { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: var(--radius-sm); font-size: 0.875rem; font-weight: 600; z-index: 1000; transition: all 0.3s var(--ease-smooth); }
  .notify.success { background: var(--green-soft); border: 1px solid rgba(34,197,94,0.2); color: var(--green); }
  .notify.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: var(--red); }
  @media (max-width: 640px) { .split { grid-template-columns: 1fr; } }
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a class="back" href="/">&larr; Back to home</a>
      <h1>Contact <em>Shrtly</em></h1>
      <p>Get in touch with us. We'd love to hear from you.</p>
    </div>
    <div class="split">
      <div>
        <div class="content" id="pageContent">
          <div class="loading" style="color:var(--text-tertiary)">Loading...</div>
        </div>
      </div>
      <div>
        <h2 style="font-size:1.15rem;font-weight:700;margin-bottom:16px">Send us a message</h2>
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="ticketName" placeholder="Your name">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="ticketEmail" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Subject</label>
          <input type="text" id="ticketSubject" placeholder="How can we help?">
        </div>
        <div class="form-group">
          <label>Message</label>
          <textarea id="ticketMessage" rows="5" placeholder="Tell us more..."></textarea>
        </div>
        <button class="btn-primary" id="ticketSubmitBtn" onclick="submitTicket()">Send message <span style="font-size:0.75rem">&#8599;</span></button>
      </div>
    </div>
  </div>
  <div id="notify" style="display:none"></div>
  <script>
    fetch('/api/pages/content?page=contact')
      .then(r => r.json())
      .then(data => {
        const el = document.getElementById('pageContent');
        if (data.content) {
          el.innerHTML = data.content;
        } else {
          el.innerHTML = '<p>Have a question, suggestion, or need help? Fill out the form and we\'ll get back to you as soon as possible.</p><p>You can also reach us via email.</p>';
        }
      })
      .catch(() => {
        document.getElementById('pageContent').innerHTML = '<p>Failed to load content.</p>';
      });

    function notify(msg, type) {
      const el = document.getElementById('notify');
      el.textContent = msg;
      el.className = 'notify ' + (type || 'success');
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 4000);
    }

    async function submitTicket() {
      const name = document.getElementById('ticketName').value.trim();
      const email = document.getElementById('ticketEmail').value.trim();
      const subject = document.getElementById('ticketSubject').value.trim();
      const message = document.getElementById('ticketMessage').value.trim();
      if (!name || !email || !subject || !message) { notify('All fields are required.', 'error'); return; }
      const btn = document.getElementById('ticketSubmitBtn');
      btn.disabled = true;
      btn.textContent = 'Sending...';
      try {
        const res = await fetch('/api/tickets', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, subject, message })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed');
        notify('Message sent! We\'ll get back to you soon.');
        document.getElementById('ticketName').value = '';
        document.getElementById('ticketEmail').value = '';
        document.getElementById('ticketSubject').value = '';
        document.getElementById('ticketMessage').value = '';
      } catch (err) { notify('Error: ' + err.message, 'error'); }
      finally { btn.disabled = false; btn.textContent = 'Send message \u{2199}'; }
    }
  </script>
</body>
</html>
