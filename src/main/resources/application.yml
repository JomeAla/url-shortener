spring:
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:h2:file:./data/urlshortener;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB

logging:
  level:
    com.jomea: DEBUG

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 1000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 0

app:
  base-url: http://localhost:8081
  max-url-length: 2048
  default-currency: NGN
  encryption-key: ${APP_ENCRYPTION_KEY:Ch4ng3Th1sK3y!99}

server:
  port: 8081
  tomcat:
    threads:
      max: 200
